<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Martha's Flower Shop</title>


<style>
body {
font-family: Arial, sans-serif;
background-color: #f0fff0;
margin: 0;
}

h1 {
text-align: center;
color: darkgreen;
}

.container {
display: flex;
justify-content: space-between;
padding: 20px;
}

.items, .cart {
width: 45%;
background: #ffffff;
padding: 15px;
border-radius: 10px;
box-shadow: 0px 0px 10px gray;
}

.item {
margin-bottom: 20px;
border-bottom: 1px solid #ccc;
padding-bottom: 10px;
}

.button {
background-color: red;
color:red;
border: none;
padding: 8px;
cursor: pointer;
border-radius: 5px;
display: inline-block;
}

button:hover {
background-color: blue;
}

img {
width: 100px;
height: 100px;
border-radius: 10px;
}

.garden {
display: block;
margin: 10px auto;
width: 80%;
border-radius: 15px;



}

#one {background-color:yellow;}
#two {background-color:rgb(8, 0, 255);}
#three {background-color:rgb(255, 0, 0);}
#four {background-color:aquamarine;}

</style>

</head>
<body>

<h1>🌸 Martha's Flower Shop 🌸</h1>

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSgTAUOcAVnlVgj5osXOVKs6hrIdY-rzDRfvw&s" class="garden">

<div class="container">

<!-- LEFT SIDE ITEMS -->
<div class="items">
<h2>Flowers for Sale</h2>

<div class="item">
<img src="https://i.etsystatic.com/31584606/r/il/bccf7b/6938090933/il_300x300.6938090933_do00.jpg">
<p>Rose - $5</p>
<button  id="one" onclick="addToCart('Rose', 5)">Add</button>
</div>

<div class="item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUysCIjtOZdx3TsrsW1RCP1SUsBRoYWJQwlQ&s">
<p>Tulip - $4</p>
<button  id="two"   onclick="addToCart('Tulip', 4)">Add</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1470509037663-253afd7f0f51">
<p>Sunflower - $6</p>
<button  id="three"  onclick="addToCart('Sunflower', 6)">Add</button>
</div>

<div class="item">
<img src="https://images.unsplash.com/photo-1470509037663-253afd7f0f51">
<p>couch - $500</p>
<button   onclick="addToCart('couch', 500)">Add</button>
</div>

<button id="colorBtn">Change Background</button>

<script>
let changed = false;

document.getElementById("colorBtn").onclick = function() {

if (changed === false) {
document.body.style.backgroundColor = "green";
changed = true;
} else {
document.body.style.backgroundColor = "white";
changed = false;
}

};
</script>


<p>
Learn more about flowers here:
<a href="https://farmgirlflowers.com/shop?sort_by=recommended&min_price=1&max_price=500" target="_blank" alt="Flower website" >Flower Guide </a>

</p>
</div>

<!-- RIGHT SIDE CART -->
<div class="cart">
<h2>Your Cart</h2>
<ul id="cartList"></ul>
<h3>Total: $<span id="total">0</span></h3>
</div>

</div>

<!-- FLOWER PICK SECTION -->
<div style="text-align:center; margin-top:20px;">
<h2>Pick Your Favorite Flower 🌼</h2>

<ul style="list-style-type: disc; display:inline-block; text-align:left;">
<li><input type="radio" name="flower" value="Rose"> Rose</li>
<li><input type="radio" name="flower" value="Tulip"> Tulip</li>
<li><input type="radio" name="flower" value="Sunflower"> Sunflower</li>
</ul>

<br><br>
<button onclick="submitFlower()">Submit</button>

<p id="selection"></p>
</div>

<script>
let total = 0;

function addToCart(name, price) {
let cartList = document.getElementById('cartList');
let li = document.createElement('li');
li.textContent = name + " - $" + price;
cartList.appendChild(li);

total += price;
document.getElementById('total').textContent = total;
}

function submitFlower() {
let flowers = document.getElementsByName('flower');
let selected = "";

flowers.forEach(f => {
if (f.checked) {
selected = f.value;
}
});

if (selected === "") {
document.getElementById('selection').textContent = "Please pick a flower!";
} else {
document.getElementById('selection').textContent = "You picked: " + selected;
}
}







</script>

</body>
</html>
